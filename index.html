<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Jogo da Nave - CodeMinds</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>

<body>
  <div class="fundo-pagina" aria-hidden="true"></div>

  <main>
    <h1>🚀 Inferno Azul - Helena 13 anos</h1>

    <p id="statusControle">
      Teclado: setas + espaço | Joystick: mova e aperte o botão A
    </p>

    <section id="telaInicio">
      <h2>Digite seu nome para começar</h2>

      <input 
        id="nomeInicial" 
        type="text" 
        placeholder="Seu nome" 
        maxlength="20" 
      />

      <button id="btnComecar">Jogar</button>
    </section>

    <div id="game-container"></div>

    <div id="modalGameOver" class="modal hidden">
      <div class="modal-content">
        <h2>Fim de jogo!</h2>

        <p id="mensagemResultado"></p>

        <section id="rankingModal">
          <h3>🏆 Placar</h3>
          <ol id="listaRanking"></ol>
        </section>

        <button id="btnReiniciar">Jogar novamente</button>
        <button id="btnNovoJogador">Novo jogador</button>
      </div>
    </div>
  </main>

  <script type="module" src="sketch.js"></script>
</body>
</html>
